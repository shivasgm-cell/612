<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD Rina❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color: transparent;
}

body{
background:black;
color:white;
overflow:hidden;
}

/* VIDEO */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* PAGE */
.page{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
transition:0.8s ease;
}

/* PAGE 0 BACKGROUND IMAGE */
#page0 {
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index:-2;
}

/* Desktop background */
@media (min-width: 769px) {
    #page0 {
        background-image: url('img.jpg');
    }
}

/* Mobile background */
@media (max-width: 768px) {
    #page0 {
        background-image: url('imgv.jpg');
    }
}

.hidden{
opacity:0;
transform:translateY(30px) scale(0.95);
pointer-events:none;
}

/* TAP BUTTON (NO GLASS, BLACK TEXT, GLOW EFFECT) */
#tapButton{
    font-size:32px;
    font-family:'Great Vibes',cursive;
    color:black;
    padding:18px 40px;
    border-radius:25px;
    background:white;
    box-shadow:0 0 20px rgba(255,255,255,0.7);
    animation:glowPulse 1.8s infinite;
    cursor:pointer;
}

@keyframes glowPulse{
    0% { box-shadow:0 0 10px rgba(255,255,255,0.4); transform:scale(1); }
    50% { box-shadow:0 0 35px rgba(255,255,255,0.9); transform:scale(1.05); }
    100% { box-shadow:0 0 10px rgba(255,255,255,0.4); transform:scale(1); }
}

/* OTHER TEXT */
.typewriter,
.peachText,
.hand {
    color:black !important;
    font-family:'Great Vibes',cursive;
}

#page4 .hand {
    font-size: clamp(24px, 6.5vw, 36px);
}

/* IMAGES */
img{
max-width:75%;
}

/* Fade-up */
.fadeUp {
    opacity: 0;
    transform: translateY(25px);
    animation: fadeUp 2.4s ease forwards;
}

@keyframes fadeUp {
    0% { opacity: 0; transform: translateY(25px); }
    60% { opacity: 1; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
}

/* FINAL.JPG STYLE */
#page4 img {
    width: min(420px, 70vw);
    height: auto;
    max-height: 60vh;
    object-fit: contain;
    border-radius: 28px;
    box-shadow: 0 0 35px rgba(255,255,255,0.35);
    animation: fadeIn 4.0s ease forwards, glowPulse2 3s ease-in-out infinite;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.94); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes glowPulse2 {
    0% { box-shadow: 0 0 10px rgba(255,255,255,0.25); }
    50% { box-shadow: 0 0 35px rgba(255,255,255,0.55); }
    100% { box-shadow: 0 0 10px rgba(255,255,255,0.25); }
}

/* BUTTON */
button{
padding:14px 24px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ffd700,#ff9ec4);
color:black;
font-weight:bold;
margin-top:15px;
font-size:16px;
transition:0.25s;
}

button:active{
transform:scale(0.9);
box-shadow:0 0 20px gold;
}

#volumeNote{
position:fixed;
top:10px;
right:10px;
font-size:12px;
z-index:10;
}
</style>
</head>

<body>

<div id="volumeNote">🔊 Please Turn ON Volume</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<!-- ⭐ INTRO1 ALWAYS BEHIND EVERYTHING ⭐ -->
<video id="intro1" muted playsinline></video>

<!-- ⭐ PAGE 0 — TAP TO BEGIN WITH BLACK TEXT + GLOW ⭐ -->
<div id="page0" class="page">
    <div id="tapButton" onclick="begin()">Tap to Begin</div>
</div>

<!-- PAGE 1 -->
<div id="page1" class="page hidden">
<video muted playsinline id="intro2"></video>

<img src="gif1.gif">

<div class="textGlass">
<h1 class="typewriter">Hi Rina,<br>I have something for you...</h1>
</div>

<button id="whatBtn" onclick="nextPage(2)">What?</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page hidden">
<video muted playsinline id="intro3"></video>

<img id="gif2" src="gif2.gif">
<img id="gif6" src="gif6.gif" style="display:none;">

<div class="textGlass">
<h2 class="peachText">
Do you wanna see something special<br>I made just for you?
</h2>
</div>

<button onclick="nextPage(3)">Yes</button>
<button onclick="noClick()" id="noBtn">No</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page hidden">
<video muted playsinline id="intro4"></video>

<img src="gif5.gif">

<div class="textGlass">
<h1 class="peachText">
June-12th,<br>
    I would never miss your birthday ❤️
</h1>
</div>

<button onclick="nextPage(4)">Blow the Candles</button>
</div>

<!-- PAGE 4 -->
<div id="page4" class="page hidden">
<video muted playsinline id="intro5"></video>

<img src="final.jpg">

<p class="hand fadeUp">
    To the girl with the prettiest smile,<br>
    Happy Birthday Rina<br>
    - Shiva💖
</p>

<button onclick="nextPage(5)">Next</button>
</div>

<!-- PAGE 5 -->
<div id="page5" class="page hidden">
    <video muted playsinline id="intro6"></video>

    <div class="textGlass">
        <h1 class="hand">How about you say Hi to Shiva?</h1>
    </div>

    <img id="gifSad" src="gif3.gif" style="display:none; max-width:70%;">

    <button id="noBtn5" onclick="noClick5()">Hmm...No.</button>
    <button id="yesBtn5" onclick="goInsta()">Lets Go!!</button>
</div>

<script>
/* ⭐ LOAD intro1 ⭐ */
const isMobile = window.matchMedia("(max-width: 768px)").matches;

const intro1 = document.getElementById("intro1");
intro1.src = isMobile ? "intro1v.mp4" : "intro1.mp4";
intro1.load();

/* ⭐ BEGIN FUNCTION ⭐ */
function begin(){
    document.getElementById("page0").classList.add("hidden");

    intro1.play().catch(()=>{});
    document.getElementById("music").play().catch(()=>{});

    showPage(1);
}

/* ⭐ AUTO‑SWITCH OTHER VIDEOS ⭐ */
const videoSources = {
    intro2: isMobile ? "intro2v.mp4" : "intro2.mp4",
    intro3: isMobile ? "intro3v.mp4" : "intro3.mp4",
    intro4: isMobile ? "intro4v.mp4" : "intro4.mp4",
    intro5: isMobile ? "intro5v.mp4" : "intro5.mp4",
    intro6: isMobile ? "intro6v.mp4" : "intro6.mp4"
};

Object.keys(videoSources).forEach(id => {
    const v = document.getElementById(id);
    if(v){
        v.src = videoSources[id];
        v.load();
    }
});

/* PAGE SWITCH */
function showPage(n){
  document.querySelectorAll(".page").forEach(p => p.classList.add("hidden"));

  setTimeout(() => {
    document.getElementById("page" + n).classList.remove("hidden");
  }, 200);

  if(n===1){document.getElementById("intro2").play();}
  if(n===2){document.getElementById("intro3").play();}
  if(n===3){document.getElementById("intro4").play();}
  if(n===4){document.getElementById("intro5").play();}
  if(n===5){document.getElementById("intro6").play();}

  sendTG("page", { page: n, device });
}

function nextPage(n){
  showPage(n);
}

/* NO BUTTON PAGE 2 */
function noClick(){
document.getElementById("gif2").style.display="none";
document.getElementById("gif6").style.display="block";
document.querySelector("#page2 h2").innerText="Come on...please say yes 🥺";
document.getElementById("noBtn").style.display="none";
}

/* NO BUTTON PAGE 5 */
function noClick5(){
document.getElementById("gifSad").style.display = "block";
document.getElementById("noBtn5").style.display = "none";
}
</script>

<!-- ⭐ CLOUDFLARE TRACKING ⭐ -->
<script>
function sendTG(event, data = {}) {
  fetch("https://wandering-salad-b291.shiva-sgm.workers.dev/" + event, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
}

const device = window.innerWidth < 768 ? "mobile" : "desktop";

/* OPENED */
sendTG("opened", { device });

/* VISITS */
let visits = parseInt(localStorage.getItem("visits") || "0") + 1;
localStorage.setItem("visits", visits);
sendTG("visits", { visits });

/* DURATION */
let startTime = Date.now();
window.addEventListener("beforeunload", () => {
  const duration = Date.now() - startTime;
  sendTG("duration", { duration, device });
});

/* LETS GO */
function goInsta(){
  sendTG("letsgo", { device });
  window.location.href =
    "https://www.instagram.com/im_sgm?igsh=bWtjcjB3cjR0cmhi&utm_source=qr";
}
</script>

</body>
</html>
